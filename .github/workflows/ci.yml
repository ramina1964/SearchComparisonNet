name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SearchComparisonNet.slnx

      - name: Build
        run: dotnet build SearchComparisonNet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SearchComparisonNet.slnx --configuration Release --no-build --verbosity normal
